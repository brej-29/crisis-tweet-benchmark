# Protocol A (docs/PLAN.md 1.3): mirrors the audited original project's
# model_5 (PROJECT_AUDIT.md section B): Embedding(10000, 128) ->
# Conv1D(filters=32, kernel_size=5, relu) -> GlobalMaxPool1D -> Dense(1,
# sigmoid), no dropout, epochs=5, Adam defaults (lr=0.001), no early
# stopping. `max_length` is computed fresh by scripts/run_matrix.py.
embed_dim: 128
num_filters: 32
kernel_size: 5
dropout: 0.0
lr: 0.001
max_vocab_size: 10000
max_epochs: 5
patience: null
restore_best_weights: false
