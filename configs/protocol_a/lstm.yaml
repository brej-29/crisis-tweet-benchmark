# Protocol A (docs/PLAN.md 1.3): mirrors the audited original project's
# model_2 (PROJECT_AUDIT.md section B): Embedding(10000, 128) -> LSTM(64) ->
# Dense(1, sigmoid), no dropout, epochs=5, Adam defaults (lr=0.001), no
# early stopping. `max_length` is computed fresh by scripts/run_matrix.py
# (dtc.data.protocol_a.mean_token_length), not pinned here.
embed_dim: 128
hidden_size: 64
dropout: 0.0
lr: 0.001
max_vocab_size: 10000
max_epochs: 5
patience: null
restore_best_weights: false
