# Protocol A (docs/PLAN.md 1.3): mirrors the audited original project's
# model_1 (PROJECT_AUDIT.md section B): Embedding(10000, 128) ->
# GlobalAveragePooling1D -> Dense(1, sigmoid), no dropout, epochs=5, Adam
# defaults (lr=0.001), no early stopping. `max_length` is NOT pinned here --
# scripts/run_matrix.py computes it fresh from Protocol A's own train split
# via dtc.data.protocol_a.mean_token_length (the flaw under study), and the
# actually-used value is recorded in the ledger's config snapshot, not here.
embed_dim: 128
dropout: 0.0
lr: 0.001
max_vocab_size: 10000
max_epochs: 5
patience: null
restore_best_weights: false
